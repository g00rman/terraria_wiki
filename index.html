<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terraria Wiki UA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090F;--surface:#0D1220;--card:#131A28;--card2:#1A2436;
  --b:#1E2C42;--bl:#2A3F5E;--t:#DCE4F2;--tm:#6A7E9A;--td:#36485E;
  --ac:#3E8DCC;--acd:#1E4D78;--gr:#42C46E;--or:#CC7830;--rd:#C43838;--pu:#784EC0;
}
*{box-sizing:border-box;margin:0;padding:0}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bl);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--acd)}
html,body{min-height:100vh;background:var(--bg);color:var(--t);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.6;overflow-x:hidden}

/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(7,9,15,.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--b);height:58px;padding:0 20px;display:flex;align-items:center;gap:16px}
.logo{font-family:'Pixelify Sans',monospace;font-size:20px;font-weight:700;color:var(--ac);white-space:nowrap;text-shadow:0 0 24px rgba(62,141,204,.5);flex-shrink:0;letter-spacing:.4px;user-select:none;cursor:pointer}
.logo em{color:var(--gr);font-style:normal}
.nav-wrapper{flex:1;position:relative;overflow:hidden;height:40px}
.nav-track{display:flex;gap:3px;align-items:center;position:absolute;left:0;top:50%;transition:transform .38s cubic-bezier(.4,0,.2,1),opacity .35s ease;white-space:nowrap;will-change:transform}
.nav-main{transform:translateY(-50%);opacity:1;pointer-events:all}
.nav-sub{transform:translateY(-50%) translateX(110%);opacity:0;pointer-events:none}
.nav-wrapper.expanded .nav-main{transform:translateY(-50%) translateX(-110%);opacity:0;pointer-events:none}
.nav-wrapper.expanded .nav-sub{transform:translateY(-50%) translateX(0);opacity:1;pointer-events:all}
.nbtn{font-family:'Pixelify Sans',monospace;font-size:12.5px;font-weight:500;color:var(--tm);background:none;border:1px solid transparent;border-radius:6px;padding:5px 12px;cursor:pointer;transition:all .18s;letter-spacing:.3px;white-space:nowrap}
.nbtn:hover{color:var(--t);background:var(--card);border-color:var(--b)}
.nbtn.active{color:var(--ac);background:rgba(62,141,204,.1);border-color:var(--acd)}
.nbtn.sub-on{color:var(--gr);background:rgba(66,196,110,.08);border-color:rgba(66,196,110,.25)}
.nbtn.back{color:var(--tm);padding-left:8px}
.nbtn.back::before{content:'← '}
.nav-sep{width:1px;background:var(--b);height:20px;flex-shrink:0;margin:0 3px}
.search-box{position:relative;flex-shrink:0}
#srch{background:var(--card);border:1px solid var(--b);border-radius:7px;padding:7px 12px 7px 32px;color:var(--t);font-family:'Inter',sans-serif;font-size:13px;width:190px;outline:none;transition:all .22s}
#srch::placeholder{color:var(--td)}
#srch:focus{border-color:var(--acd);width:250px;background:var(--surface);box-shadow:0 0 0 2px rgba(62,141,204,.12)}
.search-box::before{content:'⌕';position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--td);pointer-events:none;font-size:16px;line-height:1}

/* MAIN */
main{max-width:1380px;margin:0 auto;padding:22px 20px;min-height:calc(100vh - 58px)}
.ph{margin-bottom:20px}
.pt{font-family:'Pixelify Sans',monospace;font-size:26px;font-weight:700;line-height:1.2}
.pt span{color:var(--ac)}
.ps{font-size:13px;color:var(--tm);margin-top:3px}
.badge{display:inline-block;background:var(--card);border:1px solid var(--b);border-radius:4px;padding:2px 7px;font-size:10px;color:var(--tm);font-family:'Pixelify Sans',monospace;margin-left:8px;letter-spacing:.4px;vertical-align:middle}

/* FILTER CHIPS */
.frow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.fc{font-family:'Pixelify Sans',monospace;font-size:11px;font-weight:500;padding:4px 11px;border-radius:5px;border:1px solid var(--b);background:var(--card);color:var(--tm);cursor:pointer;transition:all .16s;letter-spacing:.3px}
.fc:hover{background:var(--card2);color:var(--t);border-color:var(--bl)}
.fc.on{background:rgba(62,141,204,.12);color:var(--ac);border-color:var(--acd)}
.fc.on-g{background:rgba(66,196,110,.1);color:var(--gr);border-color:rgba(66,196,110,.3)}
.fsep{width:1px;background:var(--b);height:20px;margin:0 2px}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:10px}

/* ITEM CARD */
.ic{background:var(--card);border:1px solid var(--b);border-radius:9px;padding:13px;cursor:pointer;transition:background .18s,border-color .18s,transform .18s,box-shadow .18s;position:relative;overflow:hidden}
.ic::after{content:'';position:absolute;left:0;top:7px;bottom:7px;width:3px;border-radius:2px;background:var(--rc,#ACACAC)}
.ic:hover{background:var(--card2);border-color:var(--bl);transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.ii{width:46px;height:46px;border-radius:7px;background:var(--surface);border:1px solid var(--b);display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:9px}
.iname{font-family:'Pixelify Sans',monospace;font-size:11.5px;font-weight:600;color:var(--t);line-height:1.3;margin-bottom:3px}
.ien{font-size:10px;color:var(--td);font-style:italic;margin-bottom:6px}
.itags{display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;text-transform:uppercase;letter-spacing:.5px}
.tc{background:rgba(62,141,204,.12);color:var(--ac);border:1px solid rgba(62,141,204,.2)}
.tp{background:rgba(120,78,192,.12);color:#9A6EDA;border:1px solid rgba(120,78,192,.2)}
.tu{background:rgba(66,196,110,.1);color:var(--gr);border:1px solid rgba(66,196,110,.2)}
.ts{background:rgba(204,120,48,.1);color:var(--or);border:1px solid rgba(204,120,48,.2)}
.istat{font-size:11px;color:var(--tm);margin-top:5px}.istat strong{color:var(--t)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(6px)}
.overlay.open{opacity:1;pointer-events:all}
.mbox{background:var(--surface);border:1px solid var(--bl);border-radius:14px;width:580px;max-width:calc(100vw - 32px);max-height:calc(100vh - 60px);overflow-y:auto;padding:24px;transform:scale(.96) translateY(8px);transition:transform .2s;position:relative}
.overlay.open .mbox{transform:scale(1) translateY(0)}
.mcl{position:absolute;top:14px;right:14px;background:var(--card);border:1px solid var(--b);border-radius:6px;color:var(--tm);width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all .15s;z-index:5}
.mcl:hover{background:var(--card2);color:var(--t)}
.mhdr{display:flex;gap:14px;align-items:flex-start;margin-bottom:18px}
.mbig{width:68px;height:68px;border-radius:11px;background:var(--card);border:2px solid var(--bl);display:flex;align-items:center;justify-content:center;font-size:32px;flex-shrink:0}
.mtitles{flex:1}
.mname{font-family:'Pixelify Sans',monospace;font-size:18px;font-weight:700;line-height:1.2}
.men{font-size:12px;color:var(--tm);font-style:italic;margin-top:2px}
.rtag{display:inline-block;padding:3px 9px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px;margin-top:7px;font-family:'Pixelify Sans',monospace;border:1px solid currentColor;background:rgba(0,0,0,.4)}
.msec{margin-top:14px}
.msec h4{font-family:'Pixelify Sans',monospace;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--tm);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--b)}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.si{background:var(--card);border:1px solid var(--b);border-radius:7px;padding:9px 11px}
.sl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--tm);margin-bottom:2px}
.sv{font-size:17px;font-weight:700;font-family:'Pixelify Sans',monospace;color:var(--t)}
.sv.g{color:var(--gr)}.sv.r{color:var(--rd)}.sv.b{color:var(--ac)}.sv.o{color:var(--or)}
.dbox{background:var(--card);border:1px solid var(--b);border-radius:7px;padding:11px;font-size:13px;color:var(--tm);line-height:1.6;font-style:italic}
.tipbox{border-left:3px solid var(--acd);padding:7px 11px;font-size:12px;color:var(--tm);font-style:italic;margin-top:8px}
.rbox{background:var(--card);border:1px solid var(--b);border-radius:8px;padding:11px}
.rstn{font-size:11px;color:var(--tm);margin-bottom:9px}
.rflow{display:flex;align-items:center;flex-wrap:wrap;gap:7px}
.ri{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--b);border-radius:5px;padding:5px 8px;font-size:12px;cursor:pointer;transition:all .15s}
.ri:hover{border-color:var(--bl)}
.riamt{font-weight:700;color:var(--ac);font-size:10px}
.rarrow{color:var(--td);font-size:16px}
.rres{background:rgba(62,141,204,.1);border:1px solid var(--acd);border-radius:5px;padding:5px 9px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px}

/* CRAFTS */
.clist{display:flex;flex-direction:column;gap:10px}
.cc{background:var(--card);border:1px solid var(--b);border-radius:9px;padding:14px 16px;cursor:pointer;transition:all .18s}
.cc:hover{background:var(--card2);border-color:var(--bl)}
.cch{display:flex;align-items:center;gap:11px;margin-bottom:10px}
.cci{width:42px;height:42px;background:var(--surface);border:1px solid var(--b);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ccn{font-family:'Pixelify Sans',monospace;font-size:14px;font-weight:600}
.ccs{font-size:11px;color:var(--tm);margin-top:2px}
.cflow{display:flex;align-items:center;flex-wrap:wrap;gap:6px}
.cchip{display:flex;align-items:center;gap:4px;background:var(--surface);border:1px solid var(--b);border-radius:5px;padding:4px 8px;font-size:12px}
.camt{font-weight:700;color:var(--ac);font-size:10px}
.cdesc{font-size:11px;color:var(--tm);margin-top:8px;font-style:italic}

/* ACHIEVEMENTS */
.agrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:10px}
.ac2{background:var(--card);border:1px solid var(--b);border-radius:9px;padding:13px 14px;display:flex;gap:11px;align-items:flex-start;transition:all .18s}
.ac2:hover{background:var(--card2);border-color:var(--bl)}
.ai{width:42px;height:42px;background:var(--surface);border:1px solid var(--b);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.acont{flex:1}
.an{font-family:'Pixelify Sans',monospace;font-size:12.5px;font-weight:700;margin-bottom:3px}
.ad{font-size:12px;color:var(--tm);line-height:1.5;margin-bottom:7px}
.ah{font-size:11px;color:var(--gr);background:rgba(66,196,110,.08);border:1px solid rgba(66,196,110,.18);border-radius:5px;padding:5px 9px;line-height:1.4}
.ah::before{content:'✓ ';font-weight:700}
.adiff{font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.6px;display:inline-block;margin-top:6px}
.de{background:rgba(66,196,110,.15);color:var(--gr)}
.dm{background:rgba(204,120,48,.15);color:var(--or)}
.dh{background:rgba(196,56,56,.15);color:var(--rd)}
.dx{background:rgba(120,78,192,.15);color:#9A6EDA}

/* BOSSES */
.bl{display:grid;grid-template-columns:200px 1fr;gap:18px;align-items:start}
.bsb{background:var(--card);border:1px solid var(--b);border-radius:10px;overflow:hidden;position:sticky;top:76px;max-height:calc(100vh - 100px);overflow-y:auto}
.bsbh{padding:10px 14px;font-family:'Pixelify Sans',monospace;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--tm);background:var(--surface);border-bottom:1px solid var(--b)}
.bslbl{padding:6px 14px 3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--td)}
.bsdiv{border:none;border-top:1px solid var(--b);margin:2px 0}
.bi{padding:7px 14px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--tm)}
.bi:hover{background:var(--card2);color:var(--t)}
.bi.on{background:rgba(62,141,204,.1);color:var(--ac)}
.bico{font-size:16px;width:20px;text-align:center}
.bdet{background:var(--card);border:1px solid var(--b);border-radius:10px;overflow:hidden}
.bhero{background:linear-gradient(135deg,var(--surface) 0%,var(--card) 100%);padding:24px;border-bottom:1px solid var(--b);display:flex;gap:18px;align-items:flex-start}
.bbig{width:88px;height:88px;background:var(--bg);border:2px solid var(--bl);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:44px;flex-shrink:0}
.bmeta{flex:1}
.bname{font-family:'Pixelify Sans',monospace;font-size:24px;font-weight:700;line-height:1.2}
.bnen{font-size:13px;color:var(--tm);font-style:italic;margin-top:2px}
.bph{display:inline-block;padding:3px 10px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:.5px;margin-top:8px;font-family:'Pixelify Sans',monospace}
.bpr{background:rgba(66,196,110,.12);color:var(--gr);border:1px solid rgba(66,196,110,.25)}
.bhm{background:rgba(204,120,48,.12);color:var(--or);border:1px solid rgba(204,120,48,.25)}
.bsr{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
.bchp{background:var(--surface);border:1px solid var(--b);border-radius:5px;padding:3px 9px;font-size:11px;color:var(--tm)}
.bchp strong{color:var(--t);font-family:'Pixelify Sans',monospace}
.bsum{background:rgba(66,196,110,.07);border:1px solid rgba(66,196,110,.18);border-radius:7px;padding:11px 14px;font-size:13px;color:var(--tm);margin:16px}
.batk{padding:0 16px 12px}
.ba{background:rgba(196,56,56,.07);border:1px solid rgba(196,56,56,.18);border-radius:6px;padding:7px 11px;font-size:12px;color:var(--tm);margin-bottom:6px}
.ba strong{color:#DC7070;font-size:12px}
.bdrop{padding:0 16px 14px}
.dlist{display:flex;flex-wrap:wrap;gap:6px}
.dch{background:var(--surface);border:1px solid var(--b);border-radius:5px;padding:4px 9px;font-size:12px}
.ctabs{display:flex;background:var(--surface);border-bottom:1px solid var(--b)}
.ctab{flex:1;padding:11px 8px;text-align:center;cursor:pointer;font-family:'Pixelify Sans',monospace;font-size:11.5px;font-weight:600;color:var(--tm);border-bottom:2px solid transparent;transition:all .16s;display:flex;align-items:center;justify-content:center;gap:5px}
.ctab:hover{color:var(--t)}
.ctab.on[data-c=melee]{color:#DC5050;border-bottom-color:#DC5050;background:rgba(220,80,80,.05)}
.ctab.on[data-c=ranged]{color:#50CC50;border-bottom-color:#50CC50;background:rgba(80,204,80,.05)}
.ctab.on[data-c=magic]{color:#8060D0;border-bottom-color:#8060D0;background:rgba(128,96,208,.05)}
.ctab.on[data-c=summon]{color:#D0B000;border-bottom-color:#D0B000;background:rgba(208,176,0,.05)}
.gg{padding:18px}
.gs{margin-bottom:16px}
.gs h4{font-family:'Pixelify Sans',monospace;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--tm);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--b)}
.gchips{display:flex;flex-wrap:wrap;gap:6px}
.gch{background:var(--surface);border:1px solid var(--b);border-radius:5px;padding:4px 9px;font-size:12px;color:var(--t)}
.gstr{font-size:13px;color:var(--tm);line-height:1.7;background:var(--surface);border:1px solid var(--b);border-radius:7px;padding:13px}

/* EMPTY */
.empty{text-align:center;padding:70px 20px;color:var(--tm)}
.empty-ico{font-size:42px;margin-bottom:14px;opacity:.4}
.empty h3{font-family:'Pixelify Sans',monospace;font-size:17px;color:var(--t);margin-bottom:7px}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.grid>*{animation:fadeUp .28s ease both}
.agrid>*{animation:fadeUp .28s ease both}
.clist>*{animation:fadeUp .28s ease both}
.grid>*:nth-child(1){animation-delay:.02s}.grid>*:nth-child(2){animation-delay:.04s}.grid>*:nth-child(3){animation-delay:.06s}.grid>*:nth-child(4){animation-delay:.08s}.grid>*:nth-child(n+5){animation-delay:.1s}
.agrid>*:nth-child(1){animation-delay:.02s}.agrid>*:nth-child(2){animation-delay:.04s}.agrid>*:nth-child(3){animation-delay:.06s}.agrid>*:nth-child(n+4){animation-delay:.08s}

/* SEARCH HIGHLIGHT */
.hl{background:rgba(62,141,204,.25);border-radius:2px;padding:0 2px}

/* SECTION LABEL */
.slbl{font-family:'Pixelify Sans',monospace;font-size:13px;color:var(--tm);margin-bottom:12px;text-transform:uppercase;letter-spacing:.6px;display:flex;align-items:center;gap:8px}
.slbl::after{content:'';flex:1;height:1px;background:var(--b)}

@media(max-width:760px){
  header{padding:0 12px;gap:10px}.logo{font-size:16px}
  #srch{width:120px}#srch:focus{width:160px}
  main{padding:14px 12px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(148px,1fr))}
  .bl{grid-template-columns:1fr}.bsb{position:static;max-height:none}
  .sgrid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<header>
  <div class="logo" onclick="setSection('items')">⚒️ <em>Terraria</em> Wiki</div>
  <div class="nav-wrapper" id="nw">
    <div class="nav-track nav-main" id="nm">
      <button class="nbtn active" data-s="items" onclick="setSection('items')">Предмети</button>
      <button class="nbtn" data-s="crafts" onclick="setSection('crafts')">Крафти</button>
      <button class="nbtn" data-s="achievements" onclick="setSection('achievements')">Досягнення</button>
      <button class="nbtn" data-s="bosses" onclick="setSection('bosses')">Гайди до Босів</button>
    </div>
    <div class="nav-track nav-sub" id="ns"></div>
  </div>
  <div class="search-box">
    <input type="text" id="srch" placeholder="Пошук..." oninput="handleSearch(this.value)" autocomplete="off">
  </div>
</header>
<main id="root"></main>
<div class="overlay" id="ov" onclick="closeOv(event)">
  <div class="mbox" id="mb"></div>
</div>

<script>
// ══════════════════════════════════════════════
//  CONSTANTS
// ══════════════════════════════════════════════
const RC=['#ACACAC','#7070E0','#44C044','#E08800','#D84040','#C044C0','#C89800','#00B8CC','#A00000','#FF4400'];
const RN=['Звичайна','Незвичайна','Рідкісна','Дуже рідкісна','Дуже цінна','Квест','Розробник','Майстер','Легендарна','Веселкова'];
const CAT={block:'Блок',ore:'Руда',weapon:'Зброя',armor:'Броня',tool:'Інструмент',consumable:'Зілля',accessory:'Аксесуар',furniture:'Меблі',ammo:'Боєприпаси'};
const SUB={melee:'Ближній',ranged:'Дальній',magic:'Магія',summon:'Призов',heal:'Відновлення',buff:'Баф',utility:'Утиліт'};
const STN={handcraft:'Вручну',workbench:'Верстак',anvil:'Ковадло',furnace:'Піч',mythril_anvil:'Мітрил. ковадло',lihzahrd:'Маніпулятор',alchemy:'Алхімічний стіл',crystal_ball:'Кришт. куля'};
const SUBNAV={

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
const S={sec:'items',sub:'all',tf:'all',q:'',bi:0,bc:'melee'};

// ══════════════════════════════════════════════
//  NAV
// ══════════════════════════════════════════════
function setSection(s){
  S.sec=s;S.sub='all';S.tf='all';S.q='';
  document.getElementById('srch').value='';
  render();
}
function setSub(s){S.sub=s;render();}
function setTf(t){S.tf=t;render();}
function handleSearch(v){S.q=v;render();}
function selectBoss(i){S.bi=i;render();}
function setBc(c){S.bc=c;render();}

function renderNav(){
  // main buttons
  document.querySelectorAll('#nm .nbtn').forEach(b=>{
    b.classList.toggle('active',b.dataset.s===S.sec);
  });
  const nw=document.getElementById('nw');
  const hasSub=S.sec!=='achievements';
  nw.classList.toggle('expanded',hasSub);
  const ns=document.getElementById('ns');
  if(!hasSub){ns.innerHTML='';return;}
  const items=SUBNAV[S.sec]||[];
  ns.innerHTML=`<button class="nbtn back" onclick="collapseNav()">Назад</button><div class="nav-sep"></div>${items.map(i=>`<button class="nbtn${S.sub===i.id?' sub-on':''}" onclick="setSub('${i.id}')">${i.l}</button>`).join('')}`;
}

function collapseNav(){
  document.getElementById('nw').classList.remove('expanded');
}

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
function rcolor(r){return RC[Math.min(r,RC.length-1)]||'#ACACAC';}
function statLine(it){
  if(it.stats.dmg)return`<div class="istat">Шкода: <strong>${it.stats.dmg}</strong></div>`;
  if(it.stats.def)return`<div class="istat">Захист: <strong>${it.stats.def}</strong></div>`;
  if(it.stats.heal)return`<div class="istat">+HP: <strong>${it.stats.heal}</strong></div>`;
  if(it.stats.pick)return`<div class="istat">Копання: <strong>${it.stats.pick}%</strong></div>`;
  if(it.stats.mana)return`<div class="istat">+MP: <strong>${it.stats.mana}</strong></div>`;
  return'';
}
function typeTag(t){
  if(t==='placeable')return`<span class="tag tp">Блок</span>`;
  if(t==='usable')return`<span class="tag tu">Предмет</span>`;
  return`<span class="tag tp">Обидва</span>`;
}
function subTag(sc){
  if(!sc)return'';
  return`<span class="tag ts">${SUB[sc]||sc}</span>`;
}

// ══════════════════════════════════════════════
//  ITEM CARD
// ══════════════════════════════════════════════
function icard(it){
  const col=rcolor(it.rar);
  return`<div class="ic" style="--rc:${col}" onclick="openItem(${it.id})">
<div class="ii">${it.icon}</div>
<div class="iname">${it.name}</div>
<div class="ien">${it.en}</div>
<div class="itags"><span class="tag tc">${CAT[it.cat]||it.cat}</span>${typeTag(it.type)}${subTag(it.subcat)}</div>
${statLine(it)}
</div>`;
}

// ══════════════════════════════════════════════
//  OPEN ITEM MODAL
// ══════════════════════════════════════════════
function openItem(id){
  const it=ITEMS.find(x=>x.id===id);
  if(!it)return;
  const col=rcolor(it.rar);
  const statsHtml=Object.entries(it.stats||{}).filter(([k])=>k!=='bonus').map(([k,v])=>{
    const lbl={dmg:'Шкода',def:'Захист',heal:'+HP',mana:'+MP',pick:'Копання',spd:'Швидкість',crit:'Крит%',kb:'Відкидання',duration:'Тривалість',cooldown:'Перезарядка',regen:'Відновлення/сек',dmgRed:'Зменш. шкоди',fly:'Час польоту'};
    const u={pick:'%',crit:'%',spd:'%',dmgRed:'%',duration:' сек',cooldown:' сек'};
    const cl=k==='def'||k==='heal'?'g':k==='dmg'?'r':k==='pick'||k==='spd'?'o':'b';
    const display=typeof v==='boolean'?'✓':v;
    return`<div class="si"><div class="sl">${lbl[k]||k}</div><div class="sv ${cl}">${display}${u[k]||''}</div></div>`;
  }).join('');
  const bonus=it.stats?.bonus?`<div class="msec"><h4>Бонус набору</h4><div class="dbox">${it.stats.bonus}</div></div>`:'';
  const recipe=(()=>{
    const c=CRAFTS.find(x=>x.res===it.name);
    if(!c)return'';
    const ings=c.ing.map(g=>`<div class="ri"><span>${g.ic}</span><span>${g.n}</span><span class="riamt">×${g.a}</span></div>`).join('');
    return`<div class="msec"><h4>Рецепт крафту</h4><div class="rbox"><div class="rstn">📍 ${STN[c.stn]||c.stn}</div><div class="rflow">${ings}<span class="rarrow">→</span><div class="rres">${it.icon} ${it.name} <span class="riamt">×${c.amt}</span></div></div></div></div>`;
  })();
  const mb=document.getElementById('mb');
  mb.innerHTML=`<button class="mcl" onclick="closeOv()">✕</button>
<div class="mhdr"><div class="mbig" style="box-shadow:0 0 24px ${col}33">${it.icon}</div>
<div class="mtitles"><div class="mname">${it.name}</div><div class="men">${it.en}</div>
<span class="rtag" style="color:${col}">${RN[Math.min(it.rar,RN.length-1)]||'Звичайна'}</span></div></div>
${statsHtml?`<div class="msec"><h4>Характеристики</h4><div class="sgrid">${statsHtml}</div></div>`:''}
${bonus}
<div class="msec"><h4>Опис</h4><div class="dbox">${it.desc}</div>${it.tip?`<div class="tipbox">💬 "${it.tip}"</div>`:''}</div>
<div class="msec"><h4>Інформація</h4><div class="sgrid">
<div class="si"><div class="sl">Категорія</div><div class="sv b" style="font-size:14px">${CAT[it.cat]||it.cat}</div></div>
<div class="si"><div class="sl">Тип</div><div class="sv g" style="font-size:13px">${it.type==='placeable'?'🧱 Блок':it.type==='usable'?'⚡ Предмет':'🔄 Обидва'}</div></div>
<div class="si"><div class="sl">Стек</div><div class="sv" style="font-size:14px">${it.stack}</div></div>
<div class="si"><div class="sl">Рідкісність</div><div class="sv" style="font-size:14px;color:${col}">${it.rar} — ${RN[it.rar]||'?'}</div></div>
</div></div>
${recipe}
${it.tags?.length?`<div class="msec"><h4>Теги</h4><div style="display:flex;flex-wrap:wrap;gap:5px">${it.tags.map(t=>`<span class="tag tc">${t}</span>`).join('')}</div></div>`:''}`
  document.getElementById('ov').classList.add('open');
}

// ══════════════════════════════════════════════
//  RENDER ITEMS
// ══════════════════════════════════════════════
function filterItems(){
  let list=ITEMS;
  if(S.sub!=='all')list=list.filter(i=>i.cat===S.sub);
  if(S.tf==='placeable')list=list.filter(i=>i.type==='placeable'||i.type==='both');
  if(S.tf==='usable')list=list.filter(i=>i.type==='usable'||i.type==='both');
  return list;
}
function renderItems(root){
  const list=filterItems();
  root.innerHTML=`<div class="ph">
<h1 class="pt">Предмети <span>Terraria</span><span class="badge">${list.length}</span></h1>
<p class="ps">Натисни на предмет для детальної інформації та рецепту крафту</p></div>
<div class="frow">
<button class="fc${S.tf==='all'?' on':''}" onclick="setTf('all')">🌐 Всі</button>
<button class="fc${S.tf==='placeable'?' on-g':''}" onclick="setTf('placeable')">🧱 Блоки (розміщуються)</button>
<button class="fc${S.tf==='usable'?' on-g':''}" onclick="setTf('usable')">⚡ Предмети (використання)</button>
</div>
<div class="grid">${list.map(icard).join('')}</div>`;
}

// ══════════════════════════════════════════════
//  RENDER CRAFTS
// ══════════════════════════════════════════════
function renderCrafts(root){
  let list=CRAFTS;
  if(S.sub!=='all')list=list.filter(c=>c.stn===S.sub);
  root.innerHTML=`<div class="ph"><h1 class="pt">Крафти<span class="badge">${list.length}</span></h1><p class="ps">Фільтруй по крафтовій станції. Натисни на крафт для деталей предмету.</p></div>
<div class="clist">${list.map(c=>{
  const ings=c.ing.map(g=>`<div class="cchip"><span>${g.ic}</span><span>${g.n}</span><span class="camt">×${g.a}</span></div>`).join('');
  const it=ITEMS.find(x=>x.name===c.res);
  return`<div class="cc" onclick="openItem(${it?.id||0})">
<div class="cch"><div class="cci">${c.ri||'📦'}</div><div><div class="ccn">${c.res} <span style="color:var(--ac);font-size:11px">×${c.amt}</span></div><div class="ccs">📍 ${STN[c.stn]||c.stn}</div></div></div>
<div class="cflow">${ings}<span class="rarrow">→</span><div class="cchip" style="background:rgba(62,141,204,.1);border-color:var(--acd)">${c.ri||'📦'} ${c.res} <span class="camt">×${c.amt}</span></div></div>
${c.desc?`<div class="cdesc">💡 ${c.desc}</div>`:''}</div>`;}).join('')}</div>`;
}

// ══════════════════════════════════════════════
//  RENDER ACHIEVEMENTS
// ══════════════════════════════════════════════
function renderAchievements(root){
  const dl={e:'Легке',m:'Середнє',h:'Складне',x:'Ексеперт'};
  const dc={e:'de',m:'dm',h:'dh',x:'dx'};
  root.innerHTML=`<div class="ph"><h1 class="pt">Досягнення <span>Terraria</span><span class="badge">${ACHS.length}</span></h1><p class="ps">Всі досягнення та як їх отримати. Пошук працює у рядку вгорі.</p></div>
<div class="agrid">${ACHS.map(a=>`<div class="ac2">
<div class="ai">${a.icon}</div>
<div class="acont">
<div class="an">${a.name} <span style="color:var(--td);font-size:9px;font-style:italic">${a.en}</span></div>
<div class="ad">${a.desc}</div>
<div class="ah">${a.how}</div>
<span class="adiff ${dc[a.diff]||'de'}">${dl[a.diff]||a.diff}</span>
</div></div>`).join('')}</div>`;
}

// ══════════════════════════════════════════════
//  RENDER BOSSES
// ══════════════════════════════════════════════
function renderBosses(root){
  const boss=BOSSES[S.bi]||BOSSES[0];
  const g=boss.g[S.bc];
  const sidebar=BOSSES.map((b,i)=>`<div class="bi${S.bi===i?' on':''}" onclick="selectBoss(${i})"><span class="bico">${b.icon}</span>${b.name}</div>`);
  const preList=BOSSES.filter(b=>b.phase==='pre');
  const hardList=BOSSES.filter(b=>b.phase==='hard');
  root.innerHTML=`<div class="ph"><h1 class="pt">Гайди до <span>Босів</span></h1><p class="ps">Стратегії для кожного класу. Вибери боса та клас.</p></div>
<div class="bl">
<div class="bsb">
<div class="bsbh">Всі боси (${BOSSES.length})</div>
<div class="bslbl">🌱 Пре-Хардмод</div>
${preList.map(b=>`<div class="bi${S.bi===BOSSES.indexOf(b)?' on':''}" onclick="selectBoss(${BOSSES.indexOf(b)})"><span class="bico">${b.icon}</span>${b.name}</div>`).join('')}
<hr class="bsdiv">
<div class="bslbl">🔥 Хардмод</div>
${hardList.map(b=>`<div class="bi${S.bi===BOSSES.indexOf(b)?' on':''}" onclick="selectBoss(${BOSSES.indexOf(b)})"><span class="bico">${b.icon}</span>${b.name}</div>`).join('')}
</div>
<div class="bdet">
<div class="bhero">
  <div class="bbig">${boss.icon}</div>
  <div class="bmeta">
    <div class="bname">${boss.name}</div>
    <div class="bnen">${boss.en}</div>
    <span class="bph ${boss.phase==='pre'?'bpr':'bhm'}">${boss.phase==='pre'?'Пре-Хардмод':'Хардмод'}</span>
    <div class="bsr">
      <span class="bchp">HP Норм: <strong>${boss.hp.n.toLocaleString()}</strong></span>
      <span class="bchp">Експерт: <strong>${boss.hp.e.toLocaleString()}</strong></span>
      <span class="bchp">Майстер: <strong>${boss.hp.m.toLocaleString()}</strong></span>
      <span class="bchp">Захист: <strong>${boss.def}</strong></span>
    </div>
  </div>
</div>
<div class="bsum">📌 <strong>Виклик:</strong> ${boss.summon} — ${boss.cond}</div>
<div class="batk"><div class="slbl" style="padding:0;margin:0 0 10px">Атаки</div>${boss.atk.map(a=>`<div class="ba"><strong>⚡ </strong>${a}</div>`).join('')}</div>
<div class="bdrop"><div class="slbl" style="padding:0;margin:0 0 8px">Дропи</div><div class="dlist">${boss.drops.map(d=>`<span class="dch">💎 ${d}</span>`).join('')}</div></div>
<div class="ctabs">
  <div class="ctab${S.bc==='melee'?' on':''}" data-c="melee" onclick="setBc('melee')">⚔️ Ближній</div>
  <div class="ctab${S.bc==='ranged'?' on':''}" data-c="ranged" onclick="setBc('ranged')">🏹 Дальній</div>
  <div class="ctab${S.bc==='magic'?' on':''}" data-c="magic" onclick="setBc('magic')">🔮 Магія</div>
  <div class="ctab${S.bc==='summon'?' on':''}" data-c="summon" onclick="setBc('summon')">👾 Призов</div>
</div>
<div class="gg">
  <div class="gs"><h4>🛡️ Рекомендована броня</h4><div class="gchips"><div class="gch">${g.ar}</div></div></div>
  <div class="gs"><h4>⚔️ Рекомендована зброя</h4><div class="gchips">${g.wp.map(w=>`<div class="gch">${w}</div>`).join('')}</div></div>
  <div class="gs"><h4>💍 Аксесуари</h4><div class="gchips">${g.ac.map(a=>`<div class="gch">${a}</div>`).join('')}</div></div>
  <div class="gs"><h4>📋 Стратегія</h4><div class="gstr">${g.st}</div></div>
</div>
</div>
</div>`;
}

// ══════════════════════════════════════════════
//  SEARCH
// ══════════════════════════════════════════════
function renderSearch(root,q){
  const ql=q.toLowerCase();
  const fi=ITEMS.filter(i=>i.name.toLowerCase().includes(ql)||i.en.toLowerCase().includes(ql)||(i.tags||[]).some(t=>t.includes(ql))||(i.desc||'').toLowerCase().includes(ql));
  const fc=CRAFTS.filter(c=>c.res.toLowerCase().includes(ql)||c.ing.some(g=>g.n.toLowerCase().includes(ql)));
  const fa=ACHS.filter(a=>a.name.toLowerCase().includes(ql)||a.desc.toLowerCase().includes(ql)||a.en.toLowerCase().includes(ql)||(a.how||'').toLowerCase().includes(ql));
  const fb=BOSSES.filter(b=>b.name.toLowerCase().includes(ql)||b.en.toLowerCase().includes(ql));
  const total=fi.length+fc.length+fa.length+fb.length;
  const dl={e:'Легке',m:'Середнє',h:'Складне',x:'Ексеперт'};
  const dc={e:'de',m:'dm',h:'dh',x:'dx'};
  root.innerHTML=`<div class="ph"><h1 class="pt">Пошук: <span>"${q}"</span></h1><p class="ps">Знайдено ${total} результатів: предмети (${fi.length}) · крафти (${fc.length}) · досягнення (${fa.length}) · боси (${fb.length})</p></div>
${fi.length?`<div class="slbl">⚔️ Предмети (${fi.length})</div><div class="grid" style="margin-bottom:28px">${fi.map(icard).join('')}</div>`:''}
${fc.length?`<div class="slbl">🔨 Крафти (${fc.length})</div><div class="clist" style="margin-bottom:28px">${fc.map(c=>{const ings=c.ing.map(g=>`<div class="cchip"><span>${g.ic}</span><span>${g.n}</span><span class="camt">×${g.a}</span></div>`).join('');const it=ITEMS.find(x=>x.name===c.res);return`<div class="cc" onclick="openItem(${it?.id||0})"><div class="cch"><div class="cci">${c.ri||'📦'}</div><div><div class="ccn">${c.res} ×${c.amt}</div><div class="ccs">📍 ${STN[c.stn]||c.stn}</div></div></div><div class="cflow">${ings}<span class="rarrow">→</span><div class="cchip" style="background:rgba(62,141,204,.1);border-color:var(--acd)">${c.ri||'📦'} ${c.res}</div></div></div>`;}).join('')}</div>`:''}
${fa.length?`<div class="slbl">🏆 Досягнення (${fa.length})</div><div class="agrid" style="margin-bottom:28px">${fa.map(a=>`<div class="ac2"><div class="ai">${a.icon}</div><div class="acont"><div class="an">${a.name}</div><div class="ad">${a.desc}</div><div class="ah">${a.how}</div><span class="adiff ${dc[a.diff]||'de'}">${dl[a.diff]||a.diff}</span></div></div>`).join('')}</div>`:''}
${fb.length?`<div class="slbl">👾 Боси (${fb.length})</div><div class="grid">${fb.map(b=>`<div class="ic" style="--rc:${b.phase==='pre'?'#42C46E':'#CC7830'}" onclick="selectBoss(${BOSSES.indexOf(b)});setSection('bosses')"><div class="ii">${b.icon}</div><div class="iname">${b.name}</div><div class="ien">${b.en}</div><div class="itags"><span class="tag ${b.phase==='pre'?'tu':'ts'}">${b.phase==='pre'?'Пре-Хм':'Хардмод'}</span></div><div class="istat">HP: <strong>${b.hp.n.toLocaleString()}</strong></div></div>`).join('')}</div>`:''}
${!total?`<div class="empty"><div class="empty-ico">🔍</div><h3>Нічого не знайдено</h3><p>Спробуй інший запит. Наприклад: "золото", "ближній", "хардмод"</p></div>`:''}`;
}

// ══════════════════════════════════════════════
//  OVERLAY
// ══════════════════════════════════════════════
function closeOv(e){
  if(!e||e.target===document.getElementById('ov')){
    document.getElementById('ov').classList.remove('open');
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeOv();});

// ══════════════════════════════════════════════
//  MAIN RENDER
// ══════════════════════════════════════════════
function render(){
  renderNav();
  const root=document.getElementById('root');
  if(S.q.length>1){renderSearch(root,S.q);return;}
  if(S.sec==='items')renderItems(root);
  else if(S.sec==='crafts')renderCrafts(root);
  else if(S.sec==='achievements')renderAchievements(root);
  else if(S.sec==='bosses')renderBosses(root);
}

render();
</script>
</body>
</html>
